<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e3a5f"/>

  <!-- Browser chrome bar -->
  <rect x="4" y="5" width="24" height="3" rx="1.5" fill="#7bafd4" opacity="0.5"/>

  <!-- Traffic light dots -->
  <circle cx="7.5" cy="6.5" r="1" fill="#e06c75"/>
  <circle cx="11" cy="6.5" r="1" fill="#e5c07b"/>
  <circle cx="14.5" cy="6.5" r="1" fill="#98c379"/>

  <!-- Page content area -->
  <rect x="4" y="10" width="24" height="17" rx="1.5" fill="#0f1e30"/>

  <!-- Heading line -->
  <rect x="7" y="13" width="10" height="2" rx="1" fill="#7bafd4"/>

  <!-- Text lines -->
  <rect x="7" y="17" width="18" height="1.2" rx="0.6" fill="#4a6580"/>
  <rect x="7" y="19.5" width="14" height="1.2" rx="0.6" fill="#4a6580"/>
  <rect x="7" y="22" width="16" height="1.2" rx="0.6" fill="#4a6580"/>

  <!-- Pencil (edit icon) in bottom-right -->
  <g transform="translate(20.5, 20.5) rotate(-45)">
    <rect x="-1" y="-5" width="2" height="6" rx="0.5" fill="#e5c07b"/>
    <polygon points="-1,1 1,1 0,3" fill="#e5c07b"/>
    <rect x="-1" y="-6.2" width="2" height="1.5" rx="0.4" fill="#c0956a"/>
  </g>
</svg>